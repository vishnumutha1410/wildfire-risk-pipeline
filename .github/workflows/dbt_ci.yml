name: dbt CI - Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    name: Run dbt Build and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.11.5
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          wildfire_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ACCOUNTADMIN
                warehouse: COMPUTE_WH
                database: WILDFIRE_DB
                schema: ANALYTICS
                threads: 4
          EOF
      - name: dbt debug
        working-directory: wildfire_dbt
        run: dbt debug --profiles-dir ~/.dbt
      - name: dbt run
        working-directory: wildfire_dbt
        run: dbt run --profiles-dir ~/.dbt
      - name: dbt test
        working-directory: wildfire_dbt
        run: dbt test --profiles-dir ~/.dbt
